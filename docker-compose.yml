services:
  # Redis - Message broker and cache
  redis:
    image: redis:7-alpine
    container_name: intelligence-redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - intelligence-network

  # Milvus - Vector database
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: milvus-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./data/milvus/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - intelligence-network

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: milvus-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - ./data/milvus/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - intelligence-network

  milvus-standalone:
    image: milvusdb/milvus:v2.3.3
    container_name: milvus-standalone
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    volumes:
      - ./data/milvus/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - milvus-etcd
      - milvus-minio
    networks:
      - intelligence-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intelligence-backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - SQLITE_DB=/app/data/websets.db
      - MILVUS_HOST=milvus-standalone
      - MILVUS_PORT=19530
    env_file:
      - .env
    volumes:
      - ./backend/src:/app/src
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      milvus-standalone:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - intelligence-network

  # Celery Worker - Realtime Queue
  celery-worker-realtime:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intelligence-celery-realtime
    command: celery -A src.queue.celery_app worker -Q realtime -l info --concurrency=4
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SQLITE_DB=/app/data/websets.db
      - RUVECTOR_DATA_DIR=/app/data/ruvector
    env_file:
      - .env
    volumes:
      - ./backend/src:/app/src
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - intelligence-network

  # Celery Worker - Batch Queue
  celery-worker-batch:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intelligence-celery-batch
    command: celery -A src.queue.celery_app worker -Q batch -l info --concurrency=2
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SQLITE_DB=/app/data/websets.db
      - RUVECTOR_DATA_DIR=/app/data/ruvector
    env_file:
      - .env
    volumes:
      - ./backend/src:/app/src
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - intelligence-network

  # Celery Worker - Background Queue
  celery-worker-background:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intelligence-celery-background
    command: celery -A src.queue.celery_app worker -Q background -l info --concurrency=1
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SQLITE_DB=/app/data/websets.db
      - RUVECTOR_DATA_DIR=/app/data/ruvector
    env_file:
      - .env
    volumes:
      - ./backend/src:/app/src
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - intelligence-network

  # Celery Beat - Periodic Tasks Scheduler
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intelligence-celery-beat
    command: celery -A src.queue.celery_app beat -l info
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SQLITE_DB=/app/data/websets.db
      - RUVECTOR_DATA_DIR=/app/data/ruvector
    env_file:
      - .env
    volumes:
      - ./backend/src:/app/src
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - intelligence-network

  # Flower - Celery Monitoring UI
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intelligence-flower
    command: celery -A src.queue.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - intelligence-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: intelligence-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - intelligence-network

networks:
  intelligence-network:
    driver: bridge

volumes:
  redis-data:
  app-data:
  app-logs:
